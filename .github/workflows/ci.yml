name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --extra demo --extra datahub --extra dev
      - run: uv run ruff check .
      - run: uv run pytest
      - name: Healthy dbt build
        working-directory: demo/dbt_project
        run: uv run --project ../.. dbt build --profiles-dir .
      - run: uv run python evals/run_evals.py --output artifacts/generated/eval-results.json
